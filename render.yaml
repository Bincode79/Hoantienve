databases:
  - name: hoantienve365-db
    databaseName: hoantienve365
    plan: free
    ipAllowList: []

services:
  - type: web
    name: hoantienve365
    runtime: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        fromService:
          type: web
          name: hoantienve365
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: hoantienve365-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: VITE_FCM_VAPID_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /
