# =============================================================================
# AeroRefund (HoanTienVe365) - Nginx Configuration
# =============================================================================
# Optimized for: Domain SSL, API Proxy, SPA Frontend, Security & Performance
# SSL: Let's Encrypt via Certbot (auto-configured on first run)
# Replace YOUR_DOMAIN and YOUR_SERVER_IP before deployment
# =============================================================================

# Global rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backend server (Node.js API)
upstream hoantienve_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# =============================================================================
# HTTP -> HTTPS Redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name hoanvemaybay.com www.hoanvemaybay.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        try_files $uri =404;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server (main)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hoanvemaybay.com www.hoanvemaybay.com;

    # --- SSL Certificate (Certbot manages these) ---
    ssl_certificate /etc/letsencrypt/live/hoanvemaybay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoanvemaybay.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hoanvemaybay.com/chain.pem;

    # --- SSL Security Settings ---
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # TLS 1.2 and 1.3 only (disable older insecure versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite (modern, no weak ciphers)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # --- HSTS (Strict Transport Security) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;

    # --- Root & Index ---
    root /var/www/hoantienve/frontend;
    index index.html;

    # ====================================================================
    # GZIP Compression
    # ====================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/x-javascript
        application/x-web-app-manifest+json
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # ====================================================================
    # Frontend - Static Files (SPA)
    # ====================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ====================================================================
    # API Proxy to Backend (Node.js)
    # ====================================================================
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn addr 30;

        proxy_pass http://hoantienve_backend/api/;
        proxy_http_version 1.1;

        # Required headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Disable caching for API
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_pragma $http_authorization;

        # Timeouts
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ====================================================================
    # Health Check Endpoint
    # ====================================================================
    location /health {
        proxy_pass http://hoantienve_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
        allow all;
    }

    # ====================================================================
    # PM2 Metrics Dashboard (password protected)
    # ====================================================================
    location /pm2/ {
        proxy_pass http://127.0.0.1:9618/;
        auth_basic "PM2 Metrics";
        auth_basic_user_file /etc/nginx/.htpasswd_pm2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Replace YOUR_SERVER_IP with your actual IP to restrict access
        allow 187.127.107.99;
        deny all;
    }

    # ====================================================================
    # Static Assets - Long Cache (immutable)
    # ====================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Enable brotli if available
        # brotli on;
        # brotli_types text/plain text/css application/javascript application/json image/svg+xml font/woff;
    }

    # ====================================================================
    # HTML - Short Cache
    # ====================================================================
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        access_log off;
    }

    # ====================================================================
    # Deny Access to Hidden Files
    # ====================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ====================================================================
    # Deny Sensitive Files
    # ====================================================================
    location ~* \.(env|log|sh|sql|bak|conf|config|ini|key|crt|pem)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ====================================================================
    # Error Pages
    # ====================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/hoantienve/frontend;
        internal;
    }

    # ====================================================================
    # Logging
    # ====================================================================
    access_log /var/log/nginx/hoantienve_access.log combined buffer=16k flush=2s;
    error_log /var/log/nginx/hoantienve_error.log warn;
}
